<!DOCTYPE html>
<html>
<head>
    <title>Transformer SAC Trading Simulator</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h2>🚀 Transformer SAC Trading Simulator</h2>

    <div class="top-controls">
        <input type="file" id="csvFile" accept=".csv">

        <button onclick="startSimulation()">Start</button>
        <button onclick="pauseSimulation()">Pause</button>
        <button onclick="resetSimulation()">Reset</button>
        <div class="speed-control">
            <label>Speed:</label>
            <input type="range" id="speedSlider"
                min="100"
                max="5000"
                step="100"
                value="5000">
            <span id="speedValue">5.0s</span>
        </div>
    </div>

    <!-- Info Row -->
    <div class="info-row">
        <div class="info-box">
            <span class="label">Action</span>
            <span id="action" class="value">-</span>
        </div>

        <div class="info-box">
            <span class="label">Shares</span>
            <span id="shares" class="value">0.0000</span>
        </div>

        <div class="info-box">
            <span class="label">Cash</span>
            <span id="cash" class="value">0.00</span>
        </div>

        <div class="info-box">
            <span class="label">Total Asset</span>
            <span id="portfolio" class="value">0.00</span>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts">
        <div class="chart-card">
            <h3>Close Price</h3>
            <canvas id="priceChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Portfolio Value</h3>
            <canvas id="portfolioChart"></canvas>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
